<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subpágina Secreta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .count-display {
      font-size: min(15vw, 80px);
      margin: 30px 0;
      color: #2c3e50;
      font-weight: bold;
    }

    .back-btn {
      padding: 15px 30px;
      font-size: 1.2em;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    .dark-mode {
      background-color: #1a1a1a;
      color: white;
    }

    .dark-mode .count-display {
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>Contagem Secreta 🕵️♂️</h1>
  <div class="count-display" id="countDisplay">0</div>
  <button class="back-btn" onclick="window.history.back()">Voltar ao Contador</button>

  <script>
    // Recuperar tema salvo
    if(localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
    }

    // Recuperar e exibir a contagem
    const savedCount = parseInt(localStorage.getItem('clicks')) || 0;
    document.getElementById('countDisplay').textContent = savedCount;

    // Opcional: Validar acesso secreto
    if(savedCount < 5) {
      alert('Acesso não autorizado! Volte quando tiver pelo menos 5 cliques!');
      window.history.back();
    }
  </script>
</body>
</html>
