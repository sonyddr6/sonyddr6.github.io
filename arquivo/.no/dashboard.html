<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Montano Clone</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-container {
      background-color: #2a2a2a;
      padding: 40px;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .login-container h1 {
      color: #4a9eff;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background-color: #333;
      color: #fff;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #4a9eff;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }
    button:hover {
      background-color: #3a8eef;
    }
    .error-message {
      margin-top: 15px;
      color: #ff4a4a;
      display: none;
      font-size: 14px;
    }
    /* Responsividade extra */
    @media (max-width: 480px) {
      .login-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Montano Clone</h1>
    <form id="loginForm">
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required>
      </div>
      <button type="submit">Entrar</button>
      <div id="errorMessage" class="error-message">Senha inválida. Tente novamente.</div>
    </form>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      
      // Aqui simulamos uma validação de senha. Em um ambiente real, 
      // você faria uma requisição para o servidor.
      const senhaCorreta = "senha"; // Defina a senha correta
      
      if(password === senhaCorreta) {
        // Redireciona para a página inicial (ou dashboard)
        window.location.href = "/dashboard.html";
      } else {
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
