<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #333;
            color: #f4f4f4;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .chat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .chat-square {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
        }

        .chat-square:hover {
            background-color: #0056b3;
        }

        #chat-window {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .hidden {
            display: none;
        }

        #chat-messages {
            height: 200px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        #chat-input {
            width: calc(100% - 90px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #send-message {
            width: 80px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #send-message:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chats</h1>
        <button id="dark-mode-toggle">Dark Mode</button>
        <div class="chat-grid">
            <div class="chat-square" data-chat-id="1">Chat 1</div>
            <div class="chat-square" data-chat-id="2">Chat 2</div>
            <div class="chat-square" data-chat-id="3">Chat 3</div>
            <div class="chat-square" data-chat-id="4">Chat 4</div>
            <div class="chat-square" data-chat-id="5">Chat 5</div>
            <div class="chat-square" data-chat-id="6">Chat 6</div>
        </div>
        <div id="chat-window" class="hidden">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Digite uma mensagem...">
            <button id="send-message">Enviar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        // Inicializa o Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Elementos do DOM
        const chatSquares = document.querySelectorAll('.chat-square');
        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendMessageButton = document.getElementById('send-message');
        const darkModeToggle = document.getElementById('dark-mode-toggle');

        let currentChatId = null;

        // Função para carregar mensagens
        function loadMessages(chatId) {
            chatMessages.innerHTML = '';
            db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp').onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const message = change.doc.data();
                        const messageElement = document.createElement('div');
                        messageElement.textContent = message.text;
                        chatMessages.appendChild(messageElement);
                    }
                });
            });
        }

        // Event listeners para os quadrados de chat
        chatSquares.forEach(square => {
            square.addEventListener('click', () => {
                currentChatId = square.getAttribute('data-chat-id');
                chatWindow.classList.remove('hidden');
                loadMessages(currentChatId);
            });
        });

        // Enviar mensagem
        sendMessageButton.addEventListener('click', () => {
            const messageText = chatInput.value;
            if (messageText.trim() !== '') {
                db.collection('chats').doc(currentChatId).collection('messages').add({
                    text: messageText,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                chatInput.value = '';
            }
        });

        // Dark Mode
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
