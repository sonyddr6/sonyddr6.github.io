<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Contador Mobile</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <style>
    :root {
      --button-size: min(8vw, 50px);
      --counter-size: min(15vw, 80px);
      --primary-color: #4CAF50;
      --secondary-color: #f44336;
      --accent-color: #008CBA;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f9f9f9;
      transition: background-color 0.5s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    h1 {
      color: #333;
      font-size: min(6vw, 24px);
      margin: 10px 0;
      text-align: center;
      transition: color 0.5s;
    }

    #counter {
      font-size: var(--counter-size);
      margin: 20px 0;
      color: #555;
      transition: all 0.3s;
      font-weight: bold;
    }

    #counter.counter-animation {
      transform: scale(1.2);
      color: var(--primary-color) !important;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
      padding: 10px;
    }

    button {
      font-size: min(5vw, 20px);
      padding: 15px;
      margin: 0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 300px;
      min-height: var(--button-size);
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.95);
    }

    button:hover {
      filter: brightness(1.1);
    }

    #clickBtn {
      background-color: var(--primary-color);
      color: white;
    }

    #resetBtn {
      background-color: var(--secondary-color);
      color: white;
    }

    #hiddenBtn {
      background-color: var(--accent-color);
      color: white;
      display: none;
    }

    .theme-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 24px;
      padding: 0;
      background-color: #666;
      z-index: 1000;
    }

    .achievement {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary-color);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      animation: slideDown 0.5s ease-out;
      font-size: min(4vw, 16px);
    }

    .online-users {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
    }

    .username-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      z-index: 1001;
      text-align: center;
      display: none;
    }

    .username-input {
      padding: 10px;
      margin: 10px 0;
      width: 80%;
      border: 2px solid #4CAF50;
      border-radius: 5px;
      font-size: 16px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
    }

    @keyframes slideDown {
      from { top: -50px; }
      to { top: 20px; }
    }

    .dark-mode {
      background-color: #1a1a1a;
      color: white;
    }

    .dark-mode h1 {
      color: #fff;
    }

    .dark-mode #counter {
      color: #ccc;
    }

    @media (orientation: landscape) {
      body {
        justify-content: flex-start;
        padding-top: 30px;
      }
      
      .buttons-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 90%;
      }
      
      button {
        width: 45%;
        max-width: 200px;
        font-size: min(4vw, 18px);
        padding: 12px;
      }
      
      #counter {
        font-size: min(12vw, 70px);
        margin: 30px 0;
      }
      
      h1 {
        font-size: min(5vw, 22px);
      }
    }

    @media (min-width: 768px) {
      .buttons-container {
        flex-direction: row;
        gap: 20px;
      }
      
      button {
        width: auto;
        padding: 20px 30px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="online-users" id="onlineUsers">Usuários Online: 0</div>
  <button class="theme-btn" id="themeBtn">🌓</button>
  <h1>Super Contador Mobile</h1>
  <div id="counter">0</div>
  <div class="buttons-container">
    <button id="clickBtn">Clique aqui!</button>
    <button id="resetBtn">Resetar</button>
    <button id="hiddenBtn" onclick="location.href='subpage.html'">Subpágina Secreta</button>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="username-modal" id="usernameModal">
    <h2>Bem-vindo! 👋</h2>
    <input type="text" class="username-input" id="usernameInput" placeholder="Digite seu nome" maxlength="20">
    <button onclick="saveUsername()" style="margin-top: 10px;">Salvar</button>
  </div>

  <script>
    // Configuração do Firebase
    // Substitua SUA_API_KEY e outros valores pelas credenciais do SEU projeto
const firebaseConfig = {
  apiKey: "AIzaSyDdZ8k7m2XpY4Jk9J7K5j...", // Sua chave de API real
  authDomain: "supercontador-ab2b7.firebaseapp.com",
  databaseURL: "https://supercontador-ab2b7-default-rtdb.firebaseio.com/",
  projectId: "supercontador-ab2b7",
  storageBucket: "supercontador-ab2b7.appspot.com",
  messagingSenderId: "123456789012", // Seu sender ID real
  appId: "1:123456789012:web:abcd1234..." // Seu App ID real
};

    // Inicialize o Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Referências do Banco de Dados
    const clicksRef = database.ref('clicks');
    const usersRef = database.ref('users');

    // Variáveis globais
    let count = 0;
    let currentUserRef = null;
    let currentUser = null;

    // Elementos DOM
    const counterDiv = document.getElementById('counter');

    // Função de inicialização do usuário
    function initUserPresence() {
      // Autenticação anônima
      firebase.auth().signInAnonymously()
        .then(() => {
          firebase.auth().onAuthStateChanged((user) => {
            if (user) {
              currentUser = user;
              checkUsername();
              setupUserPresence();
            }
          });
        });
    }

    function checkUsername() {
      const userRef = database.ref('users/' + currentUser.uid);
      
      userRef.once('value').then((snapshot) => {
        if (!snapshot.exists() || !snapshot.val().username) {
          showUsernameModal();
        }
      });
    }

    function showUsernameModal() {
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('usernameModal').style.display = 'block';
    }

    function saveUsername() {
      const username = document.getElementById('usernameInput').value.trim();
      if (username.length < 3 || username.length > 20) {
        alert('Nome deve ter entre 3 e 20 caracteres!');
        return;
      }

      const userRef = database.ref('users/' + currentUser.uid);
      userRef.update({
        username: username,
        created: firebase.database.ServerValue.TIMESTAMP
      });

      document.getElementById('overlay').style.display = 'none';
      document.getElementById('usernameModal').style.display = 'none';
    }

    // Função de clique atualizada
    function handleClick() {
      count++;
      
      // Atualiza localmente e no Firebase
      counterDiv.textContent = count;
      clicksRef.set(count);
      
      // Atualiza os cliques do usuário
      currentUserRef.transaction((user) => {
        if (user) {
          user.clicks = (user.clicks || 0) + 1;
          user.lastActive = firebase.database.ServerValue.TIMESTAMP;
        }
        return user;
      });

      counterDiv.classList.add('counter-animation');
      setTimeout(() => counterDiv.classList.remove('counter-animation'), 300);
      hiddenBtn.style.display = count >= 5 ? 'inline-block' : 'none';
      
      if (achievements[count]) {
        showAchievement(achievements[count]);
      }
    }

    // Touch/Click
    clickBtn.addEventListener('click', handleClick);
    clickBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      handleClick();
    });

    // Reset atualizado
    resetBtn.addEventListener('click', function() {
      count = 0;
      clicksRef.set(0);
      counterDiv.textContent = count;
      localStorage.removeItem('clicks');
      hiddenBtn.style.display = 'none';
      
      // Reseta os cliques do usuário
      currentUserRef.update({ clicks: 0 });
    });

    // Conquistas
    function showAchievement(text) {
      const div = document.createElement('div');
      div.className = 'achievement';
      div.textContent = text;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // Modo Escuro
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      themeBtn.textContent = document.body.classList.contains('dark-mode') ? '🌞' : '🌓';
    });

    // Proteções
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    document.onkeydown = function(e) {
      if (
        e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.keyCode == 85)
      ) {
        alert('Recurso desabilitado!');
        return false;
      }
    };

    // Detecção Mobile
    if ('ontouchstart' in window) {
      document.body.classList.add('touch-device');
      document.documentElement.style.setProperty('--button-size', '60px');
    }

    // Inicialização
    clicksRef.on('value', (snapshot) => {
      count = snapshot.val() || 0;
      counterDiv.textContent = count;
      hiddenBtn.style.display = count >= 5 ? 'inline-block' : 'none';
    });

    // Modifique a exibição de usuários online:
    usersRef.on('value', (snapshot) => {
      const users = snapshot.val() || {};
      const onlineUsers = Object.values(users)
        .filter(user => user.lastActive > Date.now() - 30000)
        .map(user => ({
          name: user.username || 'Anônimo',
          clicks: user.clicks || 0
        }));

      document.getElementById('onlineUsers').innerHTML = `
        Online: ${onlineUsers.length}<br>
        ${onlineUsers.map(u => `${u.name}: ${u.clicks}`).join('<br>')}
      `;
    });

    initUserPresence();
  </script>
</body>
</html>
