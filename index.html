<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Contador Mobile</title>
  <style>
    :root {
      --button-size: min(8vw, 50px);
      --counter-size: min(15vw, 80px);
      --primary-color: #4CAF50;
      --secondary-color: #f44336;
      --accent-color: #008CBA;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f9f9f9;
      transition: background-color 0.5s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    h1 {
      color: #333;
      font-size: min(6vw, 24px);
      margin: 10px 0;
      text-align: center;
      transition: color 0.5s;
    }

    #counter {
      font-size: var(--counter-size);
      margin: 20px 0;
      color: #555;
      transition: all 0.3s;
      font-weight: bold;
    }

    #counter.counter-animation {
      transform: scale(1.2);
      color: var(--primary-color) !important;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
      padding: 10px;
    }

    button {
      font-size: min(5vw, 20px);
      padding: 15px;
      margin: 0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 300px;
      min-height: var(--button-size);
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.95);
    }

    button:hover {
      filter: brightness(1.1);
    }

    #clickBtn {
      background-color: var(--primary-color);
      color: white;
    }

    #resetBtn {
      background-color: var(--secondary-color);
      color: white;
    }

    #hiddenBtn {
      background-color: var(--accent-color);
      color: white;
      display: none;
    }

    .theme-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 24px;
      padding: 0;
      background-color: #666;
      z-index: 1000;
    }

    .achievement {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary-color);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      animation: slideDown 0.5s ease-out;
      font-size: min(4vw, 16px);
    }

    @keyframes slideDown {
      from { top: -50px; }
      to { top: 20px; }
    }

    .dark-mode {
      background-color: #1a1a1a;
      color: white;
    }

    .dark-mode h1 {
      color: #fff;
    }

    .dark-mode #counter {
      color: #ccc;
    }

    @media (orientation: landscape) {
      body {
        justify-content: flex-start;
        padding-top: 30px;
      }
      
      .buttons-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 90%;
      }
      
      button {
        width: 45%;
        max-width: 200px;
        font-size: min(4vw, 18px);
        padding: 12px;
      }
      
      #counter {
        font-size: min(12vw, 70px);
        margin: 30px 0;
      }
      
      h1 {
        font-size: min(5vw, 22px);
      }
    }

    @media (min-width: 768px) {
      .buttons-container {
        flex-direction: row;
        gap: 20px;
      }
      
      button {
        width: auto;
        padding: 20px 30px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-btn" id="themeBtn">🌓</button>
  <h1>Super Contador Mobile</h1>
  <div id="counter">0</div>
  <div class="buttons-container">
    <button id="clickBtn">Clique aqui!</button>
    <button id="resetBtn">Resetar</button>
    <button id="hiddenBtn" onclick="location.href='subpage.html'">Subpágina Secreta</button>
  </div>

  <script>
    // Persistência de Dados
    let count = localStorage.getItem('clicks') || 0;
    const counterDiv = document.getElementById('counter');
    counterDiv.textContent = count;

    // Elementos DOM
    const clickBtn = document.getElementById('clickBtn');
    const resetBtn = document.getElementById('resetBtn');
    const hiddenBtn = document.getElementById('hiddenBtn');
    const themeBtn = document.getElementById('themeBtn');

    // Conquistas
    const achievements = {
      5: 'Primeiros Passos!',
      10: 'Clique Mestre!',
      25: 'Viciado em Clicks!',
      50: 'Lenda dos Cliques!'
    };

    // Evento de Clique
    function handleClick() {
      count++;
      counterDiv.textContent = count;
      localStorage.setItem('clicks', count);

      // Animação
      counterDiv.classList.add('counter-animation');
      setTimeout(() => counterDiv.classList.remove('counter-animation'), 300);

      // Botão secreto
      // Modifique a parte do botão secreto para:
const hiddenBtn = document.getElementById('hiddenBtn');

// Atualizar visibilidade do botão secreto
hiddenBtn.style.display = localStorage.getItem('clicks') >= 5 ? 'inline-block' : 'none';

// Alterar o evento de clique do botão secreto
hiddenBtn.addEventListener('click', function() {
  // Salvar a contagem atual antes de navegar
  localStorage.setItem('clicks', count);
  window.location.href = 'subpage.html';
});
     // hiddenBtn.style.display = localStorage.getItem('clicks') >= 500 ? 'inline-block' : 'none'; // sem uso ate momento primeiro comantario 

      // Conquistas
      if (achievements[count]) {
        showAchievement(achievements[count]);
      }
    }

    // Touch/Click
    clickBtn.addEventListener('click', handleClick);
    clickBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      handleClick();
    });

    // Reset
    resetBtn.addEventListener('click', function() {
      count = 0;
      counterDiv.textContent = count;
      localStorage.removeItem('clicks');
      hiddenBtn.style.display = 'none';
    });

    // Conquistas
    function showAchievement(text) {
      const div = document.createElement('div');
      div.className = 'achievement';
      div.textContent = text;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // Modo Escuro
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      themeBtn.textContent = document.body.classList.contains('dark-mode') ? '🌞' : '🌓';
    });

    // Proteções
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    document.onkeydown = function(e) {
      if (
        e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.keyCode == 85)
      ) {
        alert('Recurso desabilitado!');
        return false;
      }
    };

    // Detecção Mobile
    if ('ontouchstart' in window) {
      document.body.classList.add('touch-device');
      document.documentElement.style.setProperty('--button-size', '60px');
    }
  </script>
</body>
</html>
