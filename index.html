<!DOCTYPE html>
<html>
<head>
    <title>Bate-Papo em Tempo Real</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #chat-container {
            width: 90%;
            max-width: 600px; /* Máximo para não ficar exagerado em telas muito grandes */
            height: 80vh; /* Ajusta a altura conforme a tela */
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
        }

        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f4f4f4;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 0.9em;
        }

        .message.user {
            background: #dcf8c6;
            align-self: flex-end;
            text-align: right;
        }

        .message.other {
            background: #ffffff;
            align-self: flex-start;
            border: 1px solid #ddd;
        }

        #username-area, #input-area {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.9em;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.8;
        }

        #enter-chat {
            background: #007bff;
            color: white;
        }

        #send-button {
            background: #28a745;
            color: white;
        }

        #clear-button {
            background: #dc3545;
            color: white;
            width: 100%;
            margin-top: 5px;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            #chat-container {
                width: 100%;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">&#128172; Bate-Papo em Tempo Real</div>

        <div id="username-area">
            <input type="text" id="username-input" placeholder="Digite seu nome...">
            <button id="enter-chat">Entrar</button>
        </div>

        <div id="messages"></div>

        <div id="input-area" style="display: none;">
            <input type="text" id="message-input" placeholder="Digite sua mensagem...">
            <button id="send-button">Enviar</button>
        </div>

        <button id="clear-button">&#128465; Apagar Todas as Mensagens</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKCSa5ajS4Ffsb9zRoDbGoKdM-v6QgSG8",
            authDomain: "meuchatapp-f6f2d.firebaseapp.com",
            projectId: "meuchatapp-f6f2d",
            storageBucket: "meuchatapp-f6f2d.firebasestorage.app",
            messagingSenderId: "715047208925",
            appId: "1:715047208925:web:0087d905ee99e32354d834",
            measurementId: "G-2D2BPMSYRC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const clearButton = document.getElementById('clear-button');
        const enterChatButton = document.getElementById('enter-chat');
        const usernameInput = document.getElementById('username-input');
        let nomeUsuario = "";

        enterChatButton.addEventListener('click', () => {
            nomeUsuario = usernameInput.value.trim();
            if (nomeUsuario !== "") {
                document.getElementById('input-area').style.display = 'flex';
                usernameInput.disabled = true;
                enterChatButton.disabled = true;
            }
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message !== '' && nomeUsuario !== "") {
                db.ref('messages').push({
                    text: message,
                    user: nomeUsuario
                });
                messageInput.value = '';
            }
        }

        function displayMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');

            if (message.user === nomeUsuario) {
                messageDiv.classList.add('user');
            } else {
                messageDiv.classList.add('other');
            }

            messageDiv.textContent = `${message.user}: ${message.text}`;
            messagesDiv.appendChild(messageDiv);

            // Rola automaticamente para a última mensagem
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        db.ref('messages').on('child_added', (snapshot) => {
            const message = snapshot.val();
            displayMessage(message);
        });

        const senhaCorreta = "1234"; // Senha fixa para apagar mensagens

        clearButton.addEventListener('click', () => {
            const senhaDigitada = prompt("Digite a senha para apagar todas as mensagens:");

            if (senhaDigitada === senhaCorreta) {
                db.ref('messages').remove();
                messagesDiv.innerHTML = "";
                alert("Mensagens apagadas com sucesso!");
            } else {
                alert("Senha incorreta! Ação cancelada.");
            }
        });

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
