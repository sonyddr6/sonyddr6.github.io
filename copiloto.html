<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Interessante</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 2rem;
            text-align: center;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .button {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #4facfe;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #00c6ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bem-vindo ao Meu Projeto Interessante</h1>
    </header>
    <main>
        <p>Este é um espaço para criar algo incrível. Explore, experimente e divirta-se!</p>
        <a href="#" class="button">Clique Aqui</a>
    </main>
    <footer>
        <p>&copy; 2023 Meu Projeto Interessante</p>
    </footer>
</body>
</html>
