<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subpágina Secreta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f0f0f0;
    }
    
    .count-display {
      font-size: 3em;
      margin: 50px 0;
      color: #2c3e50;
    }

    .back-btn {
      padding: 15px 30px;
      font-size: 1.2em;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Contagem Secreta</h1>
  <div class="count-display" id="countDisplay">0</div>
  <button class="back-btn" onclick="window.history.back()">Voltar</button>

  <script>
    // Recupera a contagem do localStorage
    const savedCount = localStorage.getItem('clickCount') || 0;
    
    // Exibe na página
    document.getElementById('countDisplay').textContent = savedCount;

    // Opcional: Limpar o contador quando visualizado
    // localStorage.removeItem('clickCount');
  </script>
</body>
</html>
